<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><meta name="theme-color" content="#120904"/><title>ZythoHunt Reveal Lab</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/></head><body>
<div id="beer-background-root" aria-hidden="true"></div>
<div id="loading-screen" aria-live="polite" aria-label="Chargement en cours"><div class="loading-inner"><div class="loading-logo">ZYTHOHUNT</div><div class="loading-bar-track"><div class="loading-bar-fill" id="loading-bar"></div></div><div class="loading-label">Chargement des cartes…</div></div></div>
<div class="grain" aria-hidden="true"></div><div class="scene-glow" aria-hidden="true"></div><div id="scene-overlay" aria-hidden="true"></div>
<div id="app" role="main">
<header id="app-header"><div class="header-brand"><span class="header-title">ZYTHOHUNT</span><span class="header-subtitle">Collection Porters &amp; Stouts</span></div><div class="header-actions"><div class="header-progress" id="progress-display" aria-live="polite">0 / 3 révélées</div><button class="settings-btn" id="settings-btn" aria-label="Paramètres du laboratoire" aria-expanded="false">⚙</button></div></header>
<form id="reveal-search-form" class="reveal-search-form"><label for="reveal-search-input">Quel style de bière as-tu identifié ?</label><div class="reveal-search-row"><input id="reveal-search-input" type="text" autocomplete="off" spellcheck="false"/><button id="reveal-search-submit" type="submit">Révéler</button></div><p id="reveal-search-feedback" aria-live="polite"></p></form>
<div id="carousel-container" role="region" aria-label="Carrousel de la collection Porters &amp; Stouts"></div>
<div id="reveal-overlay" aria-modal="true" role="dialog" aria-label="Révélation de carte" hidden><div id="reveal-stage"></div><div id="reveal-actions" hidden><div class="reveal-message"><p class="reveal-headline" id="reveal-headline"></p><p class="reveal-sub">Carte ajoutée à la collection</p></div><div class="reveal-btns"><button class="reveal-btn reveal-btn-primary" id="btn-continue">Continuer</button></div></div></div>
<div id="debug-panel" hidden role="dialog" aria-label="Paramètres du laboratoire"><div class="debug-panel-inner"><div class="debug-panel-header"><span class="debug-panel-title">LABORATOIRE</span><button class="debug-close" id="debug-close" aria-label="Fermer">✕</button></div><div class="debug-panel-body" id="debug-panel-body"></div><div class="debug-panel-footer"><button class="debug-action-btn" data-focus-card="stout">Centrer Stout</button><button class="debug-action-btn" data-focus-card="imperial-stout">Centrer Imperial Stout</button><button class="debug-action-btn" data-focus-card="baltic-porter">Centrer Baltic Porter</button><button class="debug-action-btn" id="debug-replay">Rejouer la révélation de la carte active</button><button class="debug-action-btn" id="debug-reset-col">Réinitialiser les découvertes</button><button class="debug-action-btn" id="debug-reset-background">Réinitialiser le fond animé</button><button class="debug-action-btn" id="debug-reset-settings">Réinitialiser les réglages de révélation</button><button class="debug-action-btn" id="debug-reset-carousel">Réinitialiser les réglages du carrousel</button><button class="debug-action-btn" id="debug-reset-all">Réinitialiser tous les réglages</button></div></div></div>
</div><script type="module" src="/src/main.js"></script></body></html>
