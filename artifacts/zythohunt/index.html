<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0a06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ZythoHunt Reveal Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="loading-screen" aria-live="polite" aria-label="Chargement en cours">
    <div class="loading-inner">
      <div class="loading-logo">ZYTHOHUNT</div>
      <div class="loading-bar-track"><div class="loading-bar-fill" id="loading-bar"></div></div>
      <div class="loading-label">Chargement des cartes…</div>
    </div>
  </div>

  <div class="grain" aria-hidden="true"></div>
  <div class="scene-glow" aria-hidden="true"></div>
  <div id="scene-overlay" aria-hidden="true"></div>

  <div id="app" role="main">

    <header id="app-header">
      <div class="header-brand">
        <span class="header-title">ZYTHOHUNT</span>
        <span class="header-subtitle">Collection Porters &amp; Stouts</span>
      </div>
      <div class="header-actions">
        <div class="header-progress" id="progress-display" aria-live="polite" aria-label="Cartes révélées">0 / 3 révélées</div>
        <button class="settings-btn" id="settings-btn" aria-label="Paramètres du laboratoire">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="grid-container">
      <div id="card-grid" role="list" aria-label="Grille de cartes à révéler"></div>
      <div class="grid-glow" aria-hidden="true"></div>
    </div>

    <div id="reveal-overlay" aria-modal="true" role="dialog" aria-label="Révélation de carte" hidden>
      <div id="reveal-stage"></div>
      <div id="reveal-actions" hidden>
        <div class="reveal-message">
          <p class="reveal-headline" id="reveal-headline"></p>
          <p class="reveal-sub">Entrée ajoutée à la Brassopédie</p>
        </div>
        <div class="reveal-btns">
          <button class="reveal-btn reveal-btn-secondary" id="btn-see-sheet">Voir la fiche</button>
          <button class="reveal-btn reveal-btn-primary" id="btn-continue">Continuer</button>
        </div>
      </div>
    </div>

    <div id="data-panel" hidden role="dialog" aria-label="Fiche de la carte">
      <div class="data-panel-inner">
        <h2 class="data-panel-title" id="data-panel-title"></h2>
        <dl class="data-panel-fields" id="data-panel-fields"></dl>
        <button class="data-panel-close" id="data-panel-close" aria-label="Fermer la fiche">Fermer</button>
      </div>
    </div>

    <div id="debug-panel" hidden role="dialog" aria-label="Paramètres du laboratoire">
      <div class="debug-panel-inner">
        <div class="debug-panel-header">
          <span class="debug-panel-title">LABORATOIRE</span>
          <button class="debug-close" id="debug-close" aria-label="Fermer">✕</button>
        </div>
        <div class="debug-panel-body" id="debug-panel-body"></div>
        <div class="debug-panel-footer">
          <button class="debug-action-btn" id="debug-replay">Rejouer</button>
          <button class="debug-action-btn" id="debug-reset-col">Réinitialiser la collection</button>
          <button class="debug-action-btn" id="debug-reset-settings">Réinitialiser les réglages</button>
        </div>
      </div>
    </div>

    <nav id="app-nav" aria-label="Navigation principale">
      <button class="nav-btn" aria-label="Révéler">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Révéler</span>
      </button>
      <button class="nav-btn nav-btn-active" aria-label="Collections" aria-current="page">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="2" y="14" width="7" height="7"/><rect x="15" y="14" width="7" height="7"/></svg>
        <span>Collections</span>
      </button>
      <button class="nav-btn" aria-label="Brassopédie">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Brassopédie</span>
      </button>
      <button class="nav-btn" aria-label="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </button>
    </nav>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
