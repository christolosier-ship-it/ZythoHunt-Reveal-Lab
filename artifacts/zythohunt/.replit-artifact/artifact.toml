kind = "web"
previewPath = "/"
title = "ZythoHunt Reveal Lab"
version = "1.0.0"
id = "artifacts/zythohunt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24318

[services.development]
run = "pnpm --filter @workspace/zythohunt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zythohunt", "run", "build" ]
publicDir = "artifacts/zythohunt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24318"
BASE_PATH = "/"
