name: Validate and deploy ZythoHunt

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate

      - name: Install dependencies and generate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: generated-pnpm-lock
          path: pnpm-lock.yaml

      - name: Typecheck JavaScript
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: quality-typecheck-diagnostics
          path: typecheck.log

      - name: Stop after typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Run tests
        run: pnpm test

      - name: Build GitHub Pages artifact
        run: pnpm build
        env:
          BASE_PATH: /ZythoHunt-Reveal-Lab/

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
