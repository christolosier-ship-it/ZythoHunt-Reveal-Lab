name: Validate and deploy ZythoHunt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Typecheck JavaScript
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck > typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: frozen-typecheck-diagnostics
          path: typecheck.log
      - if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: pnpm test
      - run: pnpm build
        env:
          BASE_PATH: /ZythoHunt-Reveal-Lab/
      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
