name: Validate and deploy ZythoHunt

on:
  push:
    branches:
      - main
      - assets/porters-stouts-thumbnails
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-porters-stouts-thumbs:
    if: github.event_name == 'push' && github.ref_name == 'assets/porters-stouts-thumbnails'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: assets/porters-stouts-thumbnails

      - name: Install Pillow
        run: python -m pip install pillow

      - name: Generate 360x504 thumbnails
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          root = Path.cwd()
          source_dir = root / 'public' / 'assets' / 'collections' / 'porters-stouts'
          thumb_dir = source_dir / 'thumb'
          thumb_dir.mkdir(parents=True, exist_ok=True)
          sources = sorted(path for path in source_dir.glob('*.webp') if path.parent == source_dir)
          if not sources:
              raise SystemExit('No Porters & Stouts WEBP assets found')
          for source in sources:
              target = thumb_dir / source.name
              with Image.open(source) as image:
                  image = image.convert('RGBA').resize((360, 504), Image.Resampling.LANCZOS)
                  image.save(target, 'WEBP', quality=75, method=6)
          print(f'Generated {len(sources)} thumbnails in {thumb_dir}')
          PY

      - name: Commit generated thumbnails
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/collections/porters-stouts/thumb
          if git diff --cached --quiet; then
            echo "No thumbnail changes to commit"
          else
            git commit -m "build(assets): generate Porters Stouts thumbnails"
            git push
          fi

  build:
    needs: generate-porters-stouts-thumbs
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck JavaScript
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build GitHub Pages artifact
        run: pnpm build
        env:
          BASE_PATH: /ZythoHunt-Reveal-Lab/

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
