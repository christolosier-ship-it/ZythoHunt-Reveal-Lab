name: Temp restore carousel CSS

on:
  push:
    branches:
      - fix/restore-carousel-layout-css

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-carousel-layout-css
      - name: Restore production carousel layout CSS
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/styles.css')
          text = path.read_text()
          marker = '/* Production carousel layout restored after lab cleanup */'
          block = r'''

/* Production carousel layout restored after lab cleanup */
.carousel-stage {
  width: 100%;
  min-height: 360px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  perspective: var(--csl-persp, 1100px);
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  cursor: grab;
}
.carousel-stage:active { cursor: grabbing; }

.carousel-anchor {
  position: relative;
  width: var(--csl-card-w);
  height: var(--csl-card-h);
  transform-style: preserve-3d;
}

.csl-card {
  position: absolute;
  top: 0;
  left: 0;
  width: var(--csl-card-w);
  height: var(--csl-card-h);
  border-radius: var(--csl-radius, 10px);
  transform-style: preserve-3d;
  will-change: transform, opacity;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.csl-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  border-radius: var(--csl-radius, 10px);
}

.card-click-glow {
  position: absolute;
  inset: -18%;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(232, 160, 64, 0.35), transparent 62%);
  opacity: 0;
  pointer-events: none;
  z-index: -1;
}
'''
          if marker not in text:
            insert_before = '/* ─── Collection selector'
            if insert_before in text:
              text = text.replace(insert_before, block + '\n' + insert_before, 1)
            else:
              text += block
            path.write_text(text)
          workflow = Path('.github/workflows/temp-restore-carousel-css.yml')
          if workflow.exists():
            workflow.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/styles.css .github/workflows/temp-restore-carousel-css.yml
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "fix(styles): restore carousel layout CSS"
            git push
          fi
